<!DOCTYPE html>
<!--
  城北 · 个人站 (chengbei.org)

  本站视觉与代码结构改编自 tianruian.com（https://github.com/realruian/personal-os），
  原作者 realruian / 田睿安。已替换全部个人内容并删除原作者图像/数据。
  Visual & code structure adapted from tianruian.com — credit to @realruian.
-->
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城北 · 个人站</title>
  <meta name="description" content="城北 — 独立开发者 · 把 AI 开发带给零基础学员">

  <!-- Open Graph -->
  <meta property="og:title" content="城北">
  <meta property="og:description" content="独立开发者 · 把 AI 开发带给零基础学员">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chengbei.org">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Shader 依赖预加载：让浏览器在解析 HTML 阶段就并行下载，首屏更快上 shader -->
  <!-- CDN_VERSION: 18.3.1 — 改版本要同步改下方 3 处 + js/shaders.js line 5-7（3 处 import），共 6 处 -->
  <link rel="modulepreload" href="https://esm.sh/react@18.3.1" crossorigin>
  <link rel="modulepreload" href="https://esm.sh/react-dom@18.3.1/client" crossorigin>
  <link rel="modulepreload" href="https://esm.sh/@paper-design/shaders-react@0.0.72?deps=react@18.3.1,react-dom@18.3.1" crossorigin>

  <!-- Quiet 模式：进站前提前打 html.quiet 防闪烁 -->
  <script>
    try {
      if (localStorage.getItem('chengbei-quiet') === '1') {
        document.documentElement.classList.add('quiet');
      }
    } catch (_) {}
  </script>
</head>
<body class="light leaves">
  <div class="page">

    <!-- Col 1 — 身份 -->
    <div class="col col-1">
      <!-- logo：CBEI（Chengbei 取四字母），每个字母点击切一个主题 -->
      <svg class="logo" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="CBEI">
        <g class="logo-letter" data-mode="day">
          <text x="0" y="28" fill="black" font-family="Fragment Mono, monospace" font-size="28" font-weight="500">C</text>
        </g>
        <g class="logo-letter" data-mode="summer">
          <text x="28" y="28" fill="black" font-family="Fragment Mono, monospace" font-size="28" font-weight="500">B</text>
        </g>
        <g class="logo-letter" data-mode="night">
          <text x="60" y="28" fill="black" font-family="Fragment Mono, monospace" font-size="28" font-weight="500">E</text>
        </g>
        <g class="logo-letter" data-mode="chaos">
          <text x="90" y="28" fill="black" font-family="Fragment Mono, monospace" font-size="28" font-weight="500">I</text>
        </g>
      </svg>

      <p data-i18n="intro"></p>

      <div class="section">
        <div class="section-title" data-i18n="artifacts_title"></div>
        <div class="links" id="artifacts-links"></div>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="help_title"></div>
        <div class="links" id="help-links"></div>
      </div>

      <div class="section">
        <div class="section-title" data-i18n="writing_title"></div>
        <div class="links" id="writing-links"></div>
      </div>

      <div class="social-fixed">
        <div class="motion-switch">
          <button type="button" class="motion-btn" data-motion="motion" data-i18n="motion_btn"></button>
          <span class="lang-sep">/</span>
          <button type="button" class="motion-btn" data-motion="quiet" data-i18n="quiet_btn"></button>
        </div>
        <div class="lang-switch">
          <button type="button" class="lang-btn" data-lang="zh">中</button>
          <span class="lang-sep">/</span>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="section-title" data-i18n="social_title"></div>
        <div class="links" id="social-links"></div>

        <!-- 访问统计（GoatCounter 公开 counter API，拿不到数据时整条隐藏） -->
        <div class="visit-stats" id="visit-stats" hidden>
          <span data-i18n="stats_total"></span> <b id="stat-total">–</b>
          <span class="stats-sep">·</span>
          <span data-i18n="stats_today"></span> <b id="stat-today">–</b>
          <span class="stats-sep">·</span>
          <a href="https://chengbei.goatcounter.com" target="_blank" rel="noopener" data-i18n="stats_link"></a>
        </div>
      </div>

    </div>

    <!-- Col 2 — thoughts / voice / video 时间线 -->
    <div class="col" id="col-thoughts">
      <div class="entry how-to-entry visible" data-i18n="howto"></div>
      <div class="col-loader"></div>
    </div>

    <!-- Col 3 — 图片 / 画廊 -->
    <div class="col" id="col-images">
      <div class="col-loader"></div>
    </div>

    <!-- 文章详情视图（全屏沉浸） -->
    <article id="post-view" hidden>
      <div class="post-loading" aria-hidden="true"></div>
      <button class="post-close" aria-label="返回首页">×</button>
      <div class="post-container">
        <div class="post-meta"></div>
        <h1 class="post-title"></h1>
        <div class="post-body"></div>
      </div>
    </article>

  </div>

  <!-- 氛围叠加层（视频/音频） -->
  <video id="leaves-overlay" src="assets/leaves.mp4" loop muted playsinline autoplay preload="auto"></video>
  <!-- preload=none：1.6MB 音频不抢首屏带宽，首次交互播放时才开始下载 -->
  <audio id="forest-audio"   src="assets/forest.mp3" loop preload="none"></audio>
  <video id="moon-overlay"   src="assets/moon.mp4"   loop muted playsinline preload="none"></video>
  <audio id="night-audio"    src="assets/night.mp3"  loop preload="none"></audio>
  <video id="rain-overlay"   src="assets/rain.mp4"   loop muted playsinline preload="none"></video>
  <audio id="rain-audio"     src="assets/rain.mp3"   loop preload="none"></audio>

  <script src="js/i18n.js"></script>
  <script src="js/quiet.js"></script>
  <script src="js/app.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/chaos.js"></script>
  <script type="module" src="js/shaders.js"></script>
  <script type="module" src="js/posts.js"></script>
  <script src="js/stats.js"></script>
  <!-- GoatCounter 访问计数（开源 · 无 Cookie） -->
  <script data-goatcounter="https://chengbei.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
